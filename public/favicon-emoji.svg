<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1e1e2e"/>
  
  <!-- Robot emoji style face -->
  <!-- Head -->
  <rect x="20" y="20" width="60" height="50" rx="12" fill="#6366f1"/>
  
  <!-- Face screen -->
  <rect x="28" y="30" width="44" height="32" rx="6" fill="#181825"/>
  
  <!-- Eyes -->
  <rect x="34" y="38" width="10" height="10" rx="2" fill="#10b981"/>
  <rect x="56" y="38" width="10" height="10" rx="2" fill="#10b981"/>
  
  <!-- Mouth (terminal line) -->
  <rect x="34" y="54" width="32" height="3" rx="1" fill="#fbbf24"/>
  
  <!-- Antenna -->
  <line x1="50" y1="20" x2="50" y2="8" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="5" r="5" fill="#f38ba8"/>
  
  <!-- Body -->
  <rect x="35" y="72" width="30" height="20" rx="4" fill="#45475a"/>
</svg>